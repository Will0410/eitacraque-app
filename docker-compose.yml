services:
  postgres:
    image: postgres:16-alpine
    container_name: eitacraque-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eitacraque
      POSTGRES_PASSWORD: eitacraque
      POSTGRES_DB: eitacraque
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eitacraque"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eitacraque-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
